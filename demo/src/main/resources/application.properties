# Nombre de la aplicación
spring.application.name=demo

# Configuración del servidor
server.port=8081
server.servlet.context-path=/api

# Codificación de caracteres (UTF-8)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Configuración de Base de Datos (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:mydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Inicialización de datos (Asegúrate de que tus scripts sean compatibles con Hibernate)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Jackson - Formateo de JSON (Aquí corregí el nombre de la propiedad)
spring.jackson.serialization.indent-output=true

# Fuerza a Spring a leer el archivo data.sql con codificación UTF-8
spring.sql.init.encoding=UTF-8